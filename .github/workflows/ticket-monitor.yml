name: Wigmore ticket monitor
run-name: "Ticket check — ${{ github.event_name }} — run #${{ github.run_number }}"

on:
  schedule:
    - cron: '7,22,37,52 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wigmore-ticket-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest

    container:
      image: mcr.microsoft.com/playwright/python:v1.59.0-noble
      options: --ipc=host

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Check ticket availability
        env:
          TICKET_URL: https://www.wigmore-hall.org.uk/whats-on/202606031930

          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python check_ticket.py

      - name: Upload debug output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ticket-monitor-debug
          path: |
            debug_page_text.txt
            debug_screenshot.png
          if-no-files-found: ignore
          retention-days: 7

      - name: Commit state change
        run: |
          if [[ -n "$(git status --porcelain state.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state.json
            git commit -m "Update ticket monitor state"
            git push
          else
            echo "No state change to commit."
          fi